name: Peakweather
options:
  bundleIdPrefix: com.shimondeitel.peakweather
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Peakweather:
    type: application
    platform: iOS
    sources:
      - path: Peakweather
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.peakweather
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Peakweather/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PeakweatherTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PeakweatherTests
      - path: Peakweather.storekit
    dependencies:
      - target: Peakweather
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.peakweather.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PeakweatherUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PeakweatherUITests
    dependencies:
      - target: Peakweather
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.peakweather.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Peakweather:
    build:
      targets:
        Peakweather: all
        PeakweatherTests: [test]
        PeakweatherUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Peakweather.storekit
    test:
      config: Debug
      storeKitConfiguration: Peakweather.storekit
      targets:
        - PeakweatherTests
        - PeakweatherUITests
    archive:
      config: Release
